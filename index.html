<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Chat-K</title>
<style>
:root{
  --accent:#007AFF;--bg:#F2F2F7;--card:#FFFFFF;--text:#000;--sub:#8E8E93;
  --sep:rgba(0,0,0,.1);--hbg:rgba(255,255,255,.92);
  --bme:#007AFF;--both:#E9E9EB;--danger:#FF3B30;--green:#34C759;
  --dm:#AF52DE;--hh:56px;
}
body.dark{
  --accent:#0A84FF;--bg:#000;--card:#1C1C1E;--text:#fff;--sub:#8E8E93;
  --sep:rgba(255,255,255,.1);--hbg:rgba(28,28,30,.94);
  --bme:#0A84FF;--both:#2C2C2E;--danger:#FF453A;--green:#30D158;--dm:#BF5AF2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:0}
body{background:var(--bg);color:var(--text);overflow:hidden;position:fixed;width:100%;height:100%;transition:background .3s,color .3s}
header{position:fixed;top:0;left:0;right:0;z-index:200;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--hbg);border-bottom:.5px solid var(--sep);display:flex;align-items:center;height:calc(var(--hh) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);padding:env(safe-area-inset-top) 4px 0}
header button{background:none;border:none;font-size:22px;color:inherit;padding:8px 12px;cursor:pointer}
.title{flex:1;text-align:center;font-weight:600;font-size:17px}
#rt-bar{position:fixed;top:calc(var(--hh) + env(safe-area-inset-top));left:0;right:0;z-index:150;display:none;overflow-x:auto;gap:8px;padding:8px 12px;background:var(--hbg);backdrop-filter:blur(10px);border-bottom:.5px solid var(--sep);align-items:flex-end;min-height:68px;scrollbar-width:none}
#rt-bar::-webkit-scrollbar{display:none}
#rt-bar.on{display:flex}
.rt-track{min-width:90px;max-width:130px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.rt-bub{background:var(--card);border:1.5px solid var(--accent);border-radius:12px;padding:6px 10px;font-size:12px;word-break:break-all;text-align:center;width:100%;animation:pop .25s cubic-bezier(.175,.885,.32,1.275)}
.rt-lbl{font-size:10px;font-weight:700;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
#chat-area{position:fixed;left:0;right:0;bottom:0;top:calc(var(--hh) + env(safe-area-inset-top));overflow-y:auto;padding:16px 12px 88px;display:flex;flex-direction:column;gap:12px;transition:top .2s}
#chat-area.bar{top:calc(var(--hh) + env(safe-area-inset-top) + 68px)}
.footer{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--hbg);backdrop-filter:blur(20px);border-top:.5px solid var(--sep);padding:8px 12px calc(8px + env(safe-area-inset-bottom));display:none;gap:8px;align-items:flex-end}
#msg-input{flex:1;border:none;background:rgba(120,120,128,.12);padding:10px 14px;border-radius:22px;color:var(--text);outline:none;font-size:16px;max-height:120px;resize:none;line-height:1.4}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
#send-btn:disabled{opacity:.35}
.att-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:4px;flex-shrink:0;opacity:.7}
.msg-row{display:flex;gap:8px;max-width:88%}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.u-icon{width:32px;height:32px;border-radius:50%;background:var(--accent);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.u-icon img{width:100%;height:100%;object-fit:cover}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;background:var(--both);color:var(--text);line-height:1.45;word-break:break-word;cursor:pointer;white-space:pre-wrap}
.me .bubble{background:var(--bme);color:#fff}
.msg-name{font-size:10px;opacity:.5;margin-bottom:3px}
.msg-meta{font-size:10px;color:var(--sub);margin-top:3px;display:flex;align-items:center;gap:6px}
.msg-row.me .msg-meta{justify-content:flex-end}
.rbadge{color:var(--accent);cursor:pointer}
.rbadge:hover{text-decoration:underline}
.img-pre{max-width:220px;border-radius:14px;cursor:pointer;display:block}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:300;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);display:none;overflow-y:auto}
.modal.active{display:block}
.mi{padding:16px 16px 32px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mhdr h2{font-size:22px;font-weight:700}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.clbl{font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.std-input{width:100%;padding:12px 14px;margin-bottom:10px;border-radius:10px;border:1.5px solid var(--sep);background:rgba(120,120,128,.06);color:var(--text);outline:none;font-size:16px;transition:border-color .2s}
.std-input:focus{border-color:var(--accent)}
.std-input[readonly]{opacity:.55}
.btn{width:100%;height:50px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;transition:opacity .15s,transform .1s}
.btn:active{opacity:.7;transform:scale(.98)}
.bp{background:var(--accent);color:#fff}
.bs{background:var(--green);color:#fff}
.bn{background:#8E8E93;color:#fff}
.bd{background:var(--danger);color:#fff}
.bdm{background:var(--dm);color:#fff}
.btn-sm{height:34px;padding:0 14px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .15s;white-space:nowrap}
.btn-sm:active{opacity:.7}
.btn-sm.d{background:var(--danger)}
.btn-sm.s{background:var(--green)}
.cbtn{width:32px;height:32px;border-radius:50%;background:rgba(120,120,128,.15);border:none;font-size:16px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcard{display:flex;align-items:center;gap:14px;cursor:pointer;padding:16px;background:var(--card);border-radius:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:opacity .15s}
.pcard:active{opacity:.7}
.iw{position:relative;flex-shrink:0}
.picon{width:48px;height:48px;border-radius:50%;background:var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px}
.picon img{width:100%;height:100%;object-fit:cover}
.odot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--bg)}
#online-sec{margin-bottom:4px}
.oscroll{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none}
.oscroll::-webkit-scrollbar{display:none}
.ouser{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.oav{width:44px;height:44px;border-radius:50%;background:var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;border:2.5px solid var(--green)}
.oav img{width:100%;height:100%;object-fit:cover}
.onm{font-size:10px;opacity:.6;max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slbl{font-size:13px;font-weight:600;color:var(--sub);margin:20px 0 8px 4px}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:opacity .15s}
.chat-item:active{opacity:.7}
.ci-icon{width:44px;height:44px;border-radius:50%;background:var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0;position:relative}
.ci-icon.dm{background:var(--dm)}
.ci-icon .odot{bottom:0;right:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-sub{font-size:12px;color:var(--sub);margin-top:2px}
.badge{background:var(--danger);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;flex-shrink:0}
.pini{font-size:14px;opacity:.5;flex-shrink:0}
.freq-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--sep)}
.freq-item:last-child{border-bottom:none}
.mem-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.mem-item:hover,.mem-item:active{background:rgba(120,120,128,.1)}
.iform{display:none;padding:16px;background:var(--card);border-radius:16px;margin-top:8px}
.iform.on{display:block}
.ifhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ifhdr h4{font-size:16px;font-weight:600}
#auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;flex-direction:column;justify-content:center;align-items:center;padding:20px}
#auth-overlay.active{display:flex}
.acard{width:100%;max-width:380px;background:var(--card);border-radius:24px;padding:36px 24px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.alogo{font-size:40px;font-weight:800;letter-spacing:-1.5px;text-align:center;margin-bottom:6px}
.asub{font-size:12px;opacity:.4;text-align:center;margin-bottom:28px}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.agrid .btn{margin:0}
.switch{position:relative;display:inline-block;width:48px;height:28px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:34px;transition:.3s}
.slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--accent)}
input:checked+.slider:before{transform:translateX(20px)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:.5px solid var(--sep)}
.ritem{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--sep)}
.ritem:last-child{border-bottom:none}
.req-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid var(--sep)}
.req-item:last-child{border-bottom:none}
#viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center}
.vtb{position:absolute;top:calc(20px + env(safe-area-inset-top));left:20px;right:20px;display:flex;justify-content:space-between}
.vbtn{background:rgba(255,255,255,.2);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
#viewer-img{max-width:90%;max-height:80vh;border-radius:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:10px}
body.dark ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
#game-modal .mhdr{padding:16px 16px 8px;margin-bottom:0}
#game-frame{flex:1;width:100%;border:none;background:#0d0f1a;display:block}
.kdots{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;pointer-events:none}
.kdots i{display:block;width:4px;height:4px;border-radius:50%;background:var(--sub);font-style:normal}
#mp-bar{background:rgba(0,0,0,.8);padding:6px 12px;display:none;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.mp-chip{background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px}
.room-player{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--sep)}
.room-player:last-child{border-bottom:none}
</style>
</head>
<body>

<header>
  <button onclick="G.home()">&#127968;</button>
  <div class="title" id="htitle">ホーム</div>
  <button id="hset" onclick="G.openSettings()" style="visibility:hidden">&#9881;&#65039;</button>
</header>

<div id="rt-bar"></div>
<div id="chat-area"></div>

<div class="footer" id="footer">
  <button class="att-btn" onclick="document.getElementById('fi').click()">&#128206;</button>
  <input type="file" id="fi" style="display:none" onchange="G.sendFile(this)">
  <textarea id="msg-input" placeholder="メッセージ..." rows="1"></textarea>
  <button id="send-btn" onclick="G.send()">↑</button>
</div>

<!-- HOME -->
<div id="home-modal" class="modal">
<div class="mi">
  <div class="pcard" onclick="G.openProfile()">
    <div class="iw"><div id="home-icon" class="picon"></div></div>
    <div style="flex:1"><div style="font-weight:700;font-size:17px" id="uname">-</div><div style="font-size:13px;opacity:.5" id="uid">@-</div></div>
    <span style="opacity:.35;font-size:20px">&rsaquo;</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin:0 0 8px">
    <span style="font-size:13px;font-weight:600;color:var(--sub)">&#127918; ゲームセンター</span>
    <div style="display:flex;gap:6px">
      <button class="btn-sm" style="background:var(--green)" onclick="G.openRoomJoin()">⚔ 参加</button>
      <button class="btn-sm" onclick="document.getElementById('game-file-in').click()">＋ 追加</button>
    </div>
    <input type="file" id="game-file-in" accept=".html" style="display:none" onchange="G.addGame(this)">
  </div>
  <div id="game-center-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px"></div>
  <div id="online-sec" style="display:none">
    <div class="slbl">&#128994; オンライン中</div>
    <div class="oscroll" id="online-list"></div>
  </div>
  <div id="freq-sec" style="display:none">
    <div class="slbl">&#128100; フレンド申請</div>
    <div class="card" id="freq-list"></div>
  </div>
  <div id="pin-sec" style="display:none">
    <div class="slbl">&#128204; ピン止め</div>
    <div id="pin-list"></div>
  </div>
  <div class="slbl">&#128172; グループ</div>
  <div id="grp-list"></div>
  <button class="btn bs" onclick="G.showForm('create')">＋ 新規グループ作成</button>
  <button class="btn bn" onclick="G.showForm('join')">ID で参加</button>
  <div id="grp-form" class="iform">
    <div class="ifhdr"><h4 id="gform-title">-</h4><button class="cbtn" onclick="document.getElementById('grp-form').classList.remove('on')">✕</button></div>
    <input type="text" id="g-id" class="std-input" placeholder="グループ名 / ID">
    <input type="password" id="g-pw" class="std-input" placeholder="パスワード">
    <button class="btn bp" onclick="G.execGroup()">実行</button>
  </div>
  <div class="slbl" style="margin-top:20px">&#128156; ダイレクトメッセージ</div>
  <div id="dm-list"></div>
  <button class="btn bdm" onclick="G.showDmForm()">＋ フレンド申請を送る</button>
  <div id="dm-form" class="iform">
    <div class="ifhdr"><h4>フレンド申請</h4><button class="cbtn" onclick="document.getElementById('dm-form').classList.remove('on')">✕</button></div>
    <input type="text" id="dm-search" class="std-input" placeholder="名前またはユーザーIDで検索" oninput="G.filterMembers(this.value)" style="margin-bottom:6px">
    <div id="dm-suggest" style="max-height:220px;overflow-y:auto;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px;align-items:center;padding-top:10px;border-top:.5px solid var(--sep)">
      <span style="font-size:12px;opacity:.5;flex:1">↑ 上から選ぶか直接入力</span>
      <button class="btn-sm" style="background:var(--accent)" onclick="G.sendFriendReqByName()">名前で送る</button>
      <button class="btn-sm" style="background:var(--dm)" onclick="G.sendFriendReqById()">IDで送る</button>
    </div>
  </div>
</div>
</div>

<!-- SETTINGS -->
<div id="set-modal" class="modal">
<div class="mi">
  <div class="mhdr"><h2 id="set-title">設定</h2><button class="cbtn" onclick="G.closeSettings()">✕</button></div>
  <div class="card">
    <div class="trow" style="border-top:none;padding-top:0">
      <span style="font-weight:500">&#128204; ピン止め</span>
      <label class="switch"><input type="checkbox" id="pin-tog" onchange="G.togglePin(this.checked)"><span class="slider"></span></label>
    </div>
  </div>
  <div id="grp-set" style="display:none">
    <div class="card">
      <div class="clbl">チーム情報</div>
      <label style="font-size:12px;opacity:.6;display:block;margin-bottom:4px">グループ名</label>
      <input type="text" id="t-name" class="std-input">
      <label style="font-size:12px;opacity:.6;display:block;margin-bottom:4px">パスワード</label>
      <input type="text" id="t-pw" class="std-input">
      <p id="t-note" style="font-size:12px;opacity:.5;margin-bottom:12px"></p>
      <button id="t-save" class="btn bp" onclick="G.saveTeam()" style="display:none">保存</button>
    </div>
    <button class="btn bd" onclick="G.leaveGroup()">&#128682; グループを退会する</button>
    <div id="host-panel" style="display:none" class="card">
      <div class="clbl">&#128081; 参加申請</div>
      <div id="req-list"></div>
    </div>
  </div>
  <div id="dm-set" style="display:none">
    <button class="btn bd" onclick="G.deleteDM()">&#128465; このDMを削除する</button>
  </div>
</div>
</div>

<!-- PROFILE -->
<div id="prof-modal" class="modal">
<div class="mi">
  <div class="mhdr"><h2>プロフィール</h2><button class="cbtn" onclick="G.closeModal('prof-modal')">✕</button></div>
  <div class="card" style="text-align:center">
    <div id="prof-icon" class="picon" style="width:80px;height:80px;margin:0 auto 16px;font-size:32px"></div>
    <button class="btn bn" onclick="document.getElementById('icon-in').click()">&#128247; 写真を変更</button>
    <input type="file" id="icon-in" accept="image/*" style="display:none" onchange="G.previewIcon(this)">
    <label style="font-size:12px;opacity:.6;display:block;margin:12px 0 4px;text-align:left">表示名</label>
    <input type="text" id="e-name" class="std-input">
    <label style="font-size:12px;opacity:.6;display:block;margin:8px 0 4px;text-align:left">パスワード変更（任意）</label>
    <input type="password" id="e-pw" class="std-input">
    <div class="trow">
      <span style="font-weight:500">&#127769; ダークモード</span>
      <label class="switch"><input type="checkbox" id="dark-tog" onchange="G.toggleDark(this.checked)"><span class="slider"></span></label>
    </div>
    <button class="btn bp" onclick="G.saveProfile()" style="margin-top:16px">設定を保存</button>
    <button class="btn bn" onclick="G.logout()">ログアウト</button>
    <button class="btn bd" onclick="G.deleteAccount()">アカウントを削除</button>
  </div>
</div>
</div>

<!-- READ -->
<div id="read-modal" class="modal">
<div class="mi">
  <div class="mhdr"><h2>既読ユーザー</h2><button class="cbtn" onclick="G.closeModal('read-modal')">✕</button></div>
  <div class="card" id="read-list"></div>
</div>
</div>

<!-- GAME -->
<div id="game-modal" class="modal">
  <div style="display:flex;flex-direction:column;height:100%">
    <div class="mhdr"><h2 id="game-title" style="font-size:18px">&#127918; ゲームセンター</h2><button class="cbtn" onclick="G.closeGame()">✕</button></div>
    <div id="mp-bar">
      <span style="font-size:11px;color:rgba(255,255,255,.5);flex-shrink:0">⚔ プレイヤー:</span>
      <div id="mp-players" style="display:flex;flex-wrap:wrap;gap:4px;flex:1"></div>
    </div>
    <iframe id="game-frame" src=""></iframe>
  </div>
</div>

<!-- GAME SETTINGS -->
<div id="game-set-modal" class="modal">
<div class="mi">
  <div class="mhdr"><h2>ゲーム設定</h2><button class="cbtn" onclick="G.closeModal('game-set-modal')">✕</button></div>
  <div class="card" style="text-align:center">
    <div id="gs-icon-wrap" style="font-size:56px;margin-bottom:10px;min-height:72px;display:flex;align-items:center;justify-content:center"></div>
    <input type="file" id="gs-icon-in" accept="image/*" style="display:none" onchange="G.previewGameIcon(this)">
    <div id="gs-owner-area" style="display:none">
      <button class="btn bn" onclick="document.getElementById('gs-icon-in').click()">&#128247; アイコンを変更</button>
    </div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,update,remove,serverTimestamp,onDisconnect}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyC0LabfY8QcZgSFySBrF5Jj6xnKMbPXbZo",databaseURL:"https://my-chat-1d626-default-rtdb.firebaseio.com",projectId:"my-chat-1d626"});
const db=getDatabase(app);

let myId=null,myName=null,myIcon="";
let curId=null,curType=null,curOther=null;
let lastSeen=JSON.parse(localStorage.getItem('ls')||'{}');
let pins={};
let curLsn=null,rtLsn=null,freqLsn=null;
let presSubs={},onlineMap={};
let sending=false,lastSig="",lastSigAt=0;
let grpMembers={};
let curRoomId=null,roomLsn=null,roomStateLsn=null,roomPlayersLsn=null,mpThrottle=null;

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=ts=>{if(!ts)return'';const d=new Date(ts);return`${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`};
const mkDmId=(a,b)=>'dm_'+[a,b].sort().join('_');
const draw=(el,url,name,dm=false)=>{
  if(!el)return;
  el.style.background=dm?'var(--dm)':'var(--accent)';
  el.innerHTML=url?`<img src="${url}" alt="">`:(name?name[0].toUpperCase():'?');
};
const kdots='<span class="kdots"><i></i><i></i><i></i></span>';

const clear=()=>{['chat_uid','chat_name','ls'].forEach(k=>localStorage.removeItem(k));myId=myName=null;};
const goAuth=()=>{
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
  $('auth-overlay').classList.add('active');
  $('footer').style.display='none';
  $('hset').style.visibility='hidden';
  $('htitle').textContent='Chat-K';
};
const check=async()=>{
  const id=localStorage.getItem('chat_uid'),nm=localStorage.getItem('chat_name');
  if(!id||!nm)return true;
  try{const s=await get(ref(db,`v20_users/${id}`));if(!s.exists()){clear();return true;}}catch{return true;}
  myId=id;myName=nm;return false;
};
const sess=(id,nm)=>{
  localStorage.setItem('chat_uid',id);localStorage.setItem('chat_name',nm);
  myId=id;myName=nm;
  $('auth-overlay').classList.remove('active');
  presence();G.home();
};

window.G={};
G.register=async()=>{
  const id=$('a-id').value.trim(),pw=$('a-pw').value;
  if(!id||!pw)return alert('IDとパスワードを入力してください');
  try{
    if((await get(ref(db,`v20_users/${id}`))).exists())return alert('そのIDはすでに使われています。');
    await set(ref(db,`v20_users/${id}`),{name:id,pw,icon:''});
    sess(id,id);
  }catch(e){alert('エラー: '+e.message);}
};
G.login=async()=>{
  const id=$('a-id').value.trim(),pw=$('a-pw').value;
  if(!id||!pw)return alert('IDとパスワードを入力してください');
  try{
    const s=await get(ref(db,`v20_users/${id}`));
    if(!s.exists())return alert('IDが見つかりません。');
    if(s.val().pw!==pw)return alert('パスワードが違います。');
    sess(id,s.val().name);
  }catch(e){alert('エラー: '+e.message);}
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')e.preventDefault();});

const presence=()=>{
  if(!myId)return;
  const pr=ref(db,`v20_presence/${myId}`);
  onValue(ref(db,'.info/connected'),s=>{
    if(s.val()){
      onDisconnect(pr).update({online:false,lastSeen:serverTimestamp()});
      update(pr,{online:true,name:myName,icon:myIcon||'',lastSeen:serverTimestamp()});
    }
  });
};

G.toggleDark=on=>{document.body.classList.toggle('dark',on);localStorage.setItem('dark',on);};
G.closeModal=id=>$(id).classList.remove('active');

// ── MP message relay ──
window.addEventListener('message',e=>{
  if(e.data&&e.data.t==='MPS'&&curRoomId){
    if(mpThrottle)clearTimeout(mpThrottle);
    mpThrottle=setTimeout(()=>{
      update(ref(db,`v20_rooms/${curRoomId}/state`),e.data.p).catch(()=>{});
    },50);
  }
});

// ── Game ──
G.openGame=(html,roomId)=>{
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
  const frame=$('game-frame');
  if(html){
    if(window._gameBlobUrl)URL.revokeObjectURL(window._gameBlobUrl);
    const blob=new Blob([html],{type:'text/html'});
    window._gameBlobUrl=URL.createObjectURL(blob);
    frame.src=window._gameBlobUrl;
  }else{
    window._gameBlobUrl=null;
    frame.src='blockbreaker.html';
  }
  if(roomId){
    curRoomId=roomId;
    $('mp-bar').style.display='flex';
    if(roomStateLsn){roomStateLsn();roomStateLsn=null;}
    if(roomPlayersLsn){roomPlayersLsn();roomPlayersLsn=null;}
    roomStateLsn=onValue(ref(db,`v20_rooms/${roomId}/state`),snap=>{
      const s=snap.exists()?snap.val():{};
      try{frame.contentWindow.postMessage({t:'MPU',s},'*');}catch{}
    });
    roomPlayersLsn=onValue(ref(db,`v20_rooms/${roomId}/players`),snap=>{
      const ps=snap.exists()?Object.values(snap.val()):[];
      try{frame.contentWindow.postMessage({t:'MPP',p:ps.map(x=>({name:x.name}))},'*');}catch{}
      $('mp-players').innerHTML=ps.map(p=>`<span class="mp-chip">${esc(p.name)}</span>`).join('');
    });
  }else{
    $('mp-bar').style.display='none';
  }
  $('game-modal').classList.add('active');
};
G.closeGame=()=>{
  $('game-modal').classList.remove('active');
  $('game-frame').src='';
  if(window._gameBlobUrl){URL.revokeObjectURL(window._gameBlobUrl);window._gameBlobUrl=null;}
  if(roomStateLsn){roomStateLsn();roomStateLsn=null;}
  if(roomPlayersLsn){roomPlayersLsn();roomPlayersLsn=null;}
  if(curRoomId){
    remove(ref(db,`v20_rooms/${curRoomId}/players/${myId}`)).catch(()=>{});
    curRoomId=null;
  }
  $('mp-bar').style.display='none';
};
G.addGame=async inp=>{
  const f=inp.files[0];if(!f)return;inp.value='';
  const name=prompt('ゲーム名を入力してください:',f.name.replace(/\.html$/i,''));
  if(!name)return;
  const html=await f.text();
  if(html.length>8000000){alert('ファイルが大きすぎます（8MB以内）');return;}
  const gid='g_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  try{
    await set(ref(db,`v20_games/${gid}`),{name,html,uid:myId,addedBy:myName,time:Date.now()});
    alert(`「${name}」を追加しました！`);loadGames();
  }catch(e){alert('追加失敗: '+e.message);}
};
G._playGameId=async gid=>{
  try{
    const s=await get(ref(db,`v20_games/${gid}`));
    if(!s.exists())return alert('ゲームが見つかりません');
    G.openGame(s.val().html);
  }catch(e){alert('読み込み失敗: '+e.message);}
};
G.openGameSettings=async gid=>{
  window._gsGid=gid;window._gsNewIcon=null;
  try{
    const s=await get(ref(db,`v20_games/${gid}`));
    if(!s.exists())return alert('ゲームが見つかりません');
    const g=s.val(),isOwner=g.uid===myId;
    $('gs-name').value=g.name||'';
    $('gs-name').readOnly=!isOwner;
    const wrap=$('gs-icon-wrap');
    wrap.innerHTML=g.icon?`<img src="${g.icon}" style="width:72px;height:72px;border-radius:14px;object-fit:cover">`:'&#127918;';
    $('gs-owner-area').style.display=isOwner?'block':'none';
    $('gs-owner-btns').style.display=isOwner?'block':'none';
    $('gs-viewer-note').style.display=isOwner?'none':'block';
    $('game-set-modal').classList.add('active');
  }catch(e){alert('エラー: '+e.message);}
};
G.previewGameIcon=inp=>{
  const f=inp.files[0];if(!f)return;inp.value='';
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas'),max=128;
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      window._gsNewIcon=c.toDataURL('image/jpeg',0.85);
      $('gs-icon-wrap').innerHTML=`<img src="${window._gsNewIcon}" style="width:72px;height:72px;border-radius:14px;object-fit:cover">`;
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
};
G.saveGameSettings=async()=>{
  const gid=window._gsGid;if(!gid)return;
  const name=$('gs-name').value.trim();
  if(!name)return alert('ゲーム名を入力してください');
  const up={name};
  if(window._gsNewIcon)up.icon=window._gsNewIcon;
  try{
    await update(ref(db,`v20_games/${gid}`),up);
    alert('保存しました！');G.closeModal('game-set-modal');loadGames();
  }catch(e){alert('エラー: '+e.message);}
};
G.deleteGameFromSettings=async()=>{
  const gid=window._gsGid,name=$('gs-name').value;
  if(!confirm(`「${name}」を削除しますか？`))return;
  try{
    await remove(ref(db,`v20_games/${gid}`));
    G.closeModal('game-set-modal');loadGames();
  }catch(e){alert('削除失敗: '+e.message);}
};

const loadGames=()=>{
  const el=$('game-center-list');if(!el)return;
  const builtin=`<div style="position:relative;background:var(--card);border-radius:14px;padding:12px;text-align:center;width:calc(50% - 4px);box-shadow:0 2px 8px rgba(0,0,0,.06)"><div style="font-size:36px;margin-bottom:6px">&#129521;</div><div style="font-weight:600;font-size:14px;margin-bottom:8px">ブロック崩し</div><button class="btn-sm" style="width:100%" onclick="G.openGame()">▶ プレイ</button></div>`;
  get(ref(db,'v20_games')).then(snap=>{
    let html=builtin;
    if(snap.exists())Object.entries(snap.val()).forEach(([gid,g])=>{
      const iconHtml=g.icon
        ?`<img src="${g.icon}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;margin:0 auto 6px;display:block">`
        :`<div style="font-size:36px;margin-bottom:6px">&#127918;</div>`;
      html+=`<div style="position:relative;background:var(--card);border-radius:14px;padding:12px;text-align:center;width:calc(50% - 4px);box-shadow:0 2px 8px rgba(0,0,0,.06)"><button onclick="event.stopPropagation();G.openGameSettings('${gid}')" style="position:absolute;top:4px;right:4px;width:32px;height:40px;background:rgba(120,120,128,.15);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1">${kdots}</button>${iconHtml}<div style="font-weight:600;font-size:14px;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 22px">${esc(g.name)}</div><div style="display:flex;gap:4px"><button class="btn-sm" style="flex:1" onclick="G._playGameId('${gid}')">&#9654;</button><button class="btn-sm" style="flex:1;background:var(--green)" onclick="G.openRoomCreate('${gid}')">&#9876;</button></div></div>`;
    });
    el.innerHTML=html;
  }).catch(()=>{el.innerHTML=builtin;});
};

// ── Room system ──
G.openRoomCreate=async gid=>{
  try{
    const s=await get(ref(db,`v20_games/${gid}`));
    if(!s.exists())return alert('ゲームが見つかりません');
    const g=s.val();
    const code=Math.random().toString(36).substr(2,6).toUpperCase();
    await set(ref(db,`v20_rooms/${code}`),{
      gameId:gid,gameName:g.name,gameIcon:g.icon||'',
      host:myId,hostName:myName,
      created:Date.now(),started:false,
      players:{[myId]:{name:myName,joined:Date.now()}}
    });
    G._showRoomModal(code,gid,g,true);
  }catch(e){alert('ルーム作成失敗: '+e.message);}
};
G.openRoomJoin=async()=>{
  const code=prompt('ルームコードを入力:');
  if(!code)return;
  const rc=code.trim().toUpperCase();
  try{
    const s=await get(ref(db,`v20_rooms/${rc}`));
    if(!s.exists())return alert('ルームが見つかりません');
    const room=s.val();
    if(room.started)return alert('このルームはすでにゲームが始まっています');
    await update(ref(db,`v20_rooms/${rc}/players/${myId}`),{name:myName,joined:Date.now()});
    const gs=await get(ref(db,`v20_games/${room.gameId}`)).catch(()=>null);
    G._showRoomModal(rc,room.gameId,gs?gs.val():{name:room.gameName,icon:room.gameIcon},room.host===myId);
  }catch(e){alert('エラー: '+e.message);}
};
G._showRoomModal=(code,gid,g,isHost)=>{
  window._roomGid=gid;
  window._roomStarted=false;
  $('room-code').textContent=code;
  const iconHtml=g&&g.icon?`<img src="${g.icon}" style="width:48px;height:48px;border-radius:10px;object-fit:cover;margin-bottom:8px">`:'<div style="font-size:40px;margin-bottom:8px">&#127918;</div>';
  $('room-game-info').innerHTML=iconHtml+`<div style="font-weight:700;font-size:16px">${esc(g?g.name:'')}</div>`;
  $('room-start-btn').style.display=isHost?'flex':'none';
  $('room-wait-msg').style.display=isHost?'none':'block';
  if(roomLsn){roomLsn();roomLsn=null;}
  curRoomId=code;
  roomLsn=onValue(ref(db,`v20_rooms/${code}`),snap=>{
    if(!snap.exists()){G.closeModal('room-modal');curRoomId=null;return;}
    const room=snap.val();
    const ps=room.players||{};
    $('room-players').innerHTML=Object.entries(ps).map(([uid,p])=>{
      const isH=uid===room.host;
      return `<div class="room-player"><div class="ci-icon${isH?' bp':''}" style="width:36px;height:36px;font-size:14px;flex-shrink:0">${esc((p.name||'?')[0].toUpperCase())}</div><div style="flex:1;font-weight:600">${esc(p.name)}${isH?' &#128081;':''}</div></div>`;
    }).join('');
    if(room.started&&!window._roomStarted){
      window._roomStarted=true;
      G._startGame(code,gid,room);
    }
  });
  $('room-modal').classList.add('active');
};
G.startRoom=async()=>{
  if(!curRoomId)return;
  try{
    await update(ref(db,`v20_rooms/${curRoomId}`),{started:true,startedAt:Date.now()});
  }catch(e){alert('エラー: '+e.message);}
};
G._startGame=async(code,gid,room)=>{
  G.closeModal('room-modal');
  try{
    const snap=await get(ref(db,`v20_games/${gid}`));
    if(!snap.exists())return alert('ゲームデータが見つかりません');
    const html=snap.val().html;
    const players=Object.values(room.players||{}).map(p=>JSON.stringify({name:p.name})).join(',');
    const bridge=`<script>window.MP=(function(){var ls={},st={};return{myId:'${myId.replace(/'/g,"\\\'")  }',myName:'${myName.replace(/'/g,"\\\'")  }',players:[${players}],setState:function(p){window.parent.postMessage({t:'MPS',p:p},'*');},getState:function(){return st;},on:function(k,cb){(ls[k]=ls[k]||[]).push(cb);return this;},_u:function(s){st=s;Object.keys(ls).forEach(function(k){if(s[k]!==undefined)ls[k].forEach(function(cb){cb(s[k]);});});}};})();window.addEventListener('message',function(e){if(e.data&&e.data.t==='MPU')MP._u(e.data.s);if(e.data&&e.data.t==='MPP')MP.players=e.data.p;});<\/script>`;
    let injected=html;
    if(/<head[^>]*>/i.test(html))injected=html.replace(/<head[^>]*>/i,m=>m+bridge);
    else if(/<html[^>]*>/i.test(html))injected=html.replace(/<html[^>]*>/i,m=>m+bridge);
    else injected=bridge+html;
    $('game-title').textContent='&#9876; '+esc(snap.val().name||'ゲーム');
    G.openGame(injected,code);
  }catch(e){alert('ゲーム読み込み失敗: '+e.message);}
};
G.leaveRoom=async()=>{
  if(roomLsn){roomLsn();roomLsn=null;}
  if(curRoomId){
    await remove(ref(db,`v20_rooms/${curRoomId}/players/${myId}`)).catch(()=>{});
    const s=await get(ref(db,`v20_rooms/${curRoomId}/players`)).catch(()=>null);
    if(!s||!s.exists())await remove(ref(db,`v20_rooms/${curRoomId}`)).catch(()=>{});
    curRoomId=null;
  }
  window._roomStarted=false;
  G.closeModal('room-modal');
};
G.copyRoomCode=()=>{
  const code=$('room-code').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(code).then(()=>alert('コードをコピーしました: '+code)).catch(()=>alert('コード: '+code));
  else alert('コード: '+code);
};

// ── Online users ──
const subOnline=async()=>{
  Object.values(presSubs).forEach(u=>u());
  presSubs={};onlineMap={};
  const uids=new Set();
  try{
    const gs=await get(ref(db,`v20_users/${myId}/myGroups`));
    if(gs.exists())for(const gid of Object.keys(gs.val())){
      const ms=await get(ref(db,`v20_groups/${gid}/members`));
      if(ms.exists())Object.keys(ms.val()).forEach(u=>uids.add(u));
    }
  }catch{}
  try{
    const ds=await get(ref(db,`v20_users/${myId}/myDMs`));
    if(ds.exists())Object.keys(ds.val()).forEach(u=>uids.add(u));
  }catch{}
  uids.delete(myId);
  const el=$('online-list'),sec=$('online-sec');
  uids.forEach(uid=>{
    presSubs[uid]=onValue(ref(db,`v20_presence/${uid}`),s=>{
      if(s.exists()&&s.val().online)onlineMap[uid]=s.val();
      else delete onlineMap[uid];
      const us=Object.entries(onlineMap);
      sec.style.display=us.length?'block':'none';
      el.innerHTML=us.map(([,i])=>`<div class="ouser"><div class="oav">${esc((i.name||'?')[0].toUpperCase())}</div><div class="onm">${esc(i.name||'')}</div></div>`).join('');
    });
  });
};

G.home=async()=>{
  if(curLsn){curLsn();curLsn=null;}
  if(rtLsn){rtLsn();rtLsn=null;}
  curId=curType=curOther=null;
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
  $('home-modal').classList.add('active');
  $('footer').style.display='none';
  $('hset').style.visibility='hidden';
  $('htitle').textContent='ホーム';
  $('rt-bar').classList.remove('on');
  $('rt-bar').innerHTML='';
  $('chat-area').classList.remove('bar');
  try{const u=await get(ref(db,`v20_users/${myId}`));if(u.exists()){myName=u.val().name;myIcon=u.val().icon||'';}}catch{}
  $('uname').textContent=myName;
  $('uid').textContent='@'+myId;
  draw($('home-icon'),myIcon,myName);
  try{const ps=await get(ref(db,`v20_users/${myId}/pinnedChats`));pins=ps.exists()?ps.val():{};}catch{}
  $('pin-list').innerHTML='';
  await loadGroups();
  await loadDMs();
  $('pin-sec').style.display=$('pin-list').children.length?'block':'none';
  loadFreq();
  subOnline();
  loadGames();
};

const loadGroups=async()=>{
  const list=$('grp-list');list.innerHTML='';
  try{
    const snap=await get(ref(db,`v20_users/${myId}/myGroups`));
    if(!snap.exists())return;
    for(const gid of Object.keys(snap.val())){
      let gname=gid.split('_')[0];
      try{const gs=await get(ref(db,`v20_groups/${gid}`));if(gs.exists()&&gs.val().name)gname=gs.val().name;}catch{}
      const unread=await calcUnread(`v20_groups/${gid}/messages`,gid);
      const pinned=!!pins[gid];
      const item=mkItem(gname,'',false,pinned,unread,()=>G.enter(gid,'group'));
      if(pinned)$('pin-list').appendChild(item);
      else list.appendChild(item);
    }
  }catch{}
};

const loadDMs=async()=>{
  const list=$('dm-list');list.innerHTML='';
  try{
    const snap=await get(ref(db,`v20_users/${myId}/myDMs`));
    if(!snap.exists())return;
    for(const[dmId,otherUid]of Object.entries(snap.val())){
      let oname=otherUid;
      try{const u=await get(ref(db,`v20_users/${otherUid}`));if(u.exists())oname=u.val().name;}catch{}
      const unread=await calcUnread(`v20_dms/${dmId}/messages`,dmId);
      const pinned=!!pins[dmId];
      const online=!!onlineMap[otherUid];
      const item=mkItem(oname,'',true,pinned,unread,()=>G.enter(dmId,'dm',otherUid),online);
      if(pinned)$('pin-list').appendChild(item);
      else list.appendChild(item);
    }
  }catch{}
};

const mkItem=(name,sub,isDm,pinned,unread,fn,online=false)=>{
  const d=document.createElement('div');
  d.className='chat-item';
  d.innerHTML=`
    <div class="ci-icon${isDm?' dm':''}">${esc(name[0]||'?')}${online?'<div class="odot"></div>':''}</div>
    <div class="ci-info"><div class="ci-name">${esc(name)}</div>${isDm?`<div class="ci-sub" style="color:var(--dm)">ダイレクトメッセージ</div>`:''}</div>
    ${pinned?'<span class="pini">&#128204;</span>':''}
    ${unread>0?`<span class="badge">&#128308; ${unread}</span>`:'<span style="opacity:.3;font-size:18px">&rsaquo;</span>'}
  `;
  d.onclick=fn;
  return d;
};

const calcUnread=async(path,chatId)=>{
  try{
    const s=await get(ref(db,path));
    if(!s.exists())return 0;
    const t=lastSeen[chatId]||0;
    return Object.values(s.val()).filter(m=>m.time>t&&m.uid!==myId).length;
  }catch{return 0;}
};

const loadFreq=()=>{
  if(freqLsn)return;
  freqLsn=onValue(ref(db,`v20_users/${myId}/friendRequests`),snap=>{
    const sec=$('freq-sec'),list=$('freq-list');
    list.innerHTML='';
    if(!snap.exists()){sec.style.display='none';return;}
    sec.style.display='block';
    Object.entries(snap.val()).forEach(([fuid,req])=>{
      const d=document.createElement('div');d.className='freq-item';
      d.innerHTML=`
        <div class="ci-icon dm" style="width:40px;height:40px;font-size:16px;flex-shrink:0">${esc((req.name||'?')[0])}</div>
        <div style="flex:1"><b>${esc(req.name||fuid)}</b><br><small style="opacity:.5">@${esc(fuid)}</small></div>
        <div style="display:flex;gap:8px">
          <button class="btn-sm s" onclick="G.acceptFreq('${fuid}','${esc(req.name||fuid)}')">&#10003; 承認</button>
          <button class="btn-sm d" onclick="G.rejectFreq('${fuid}')">&#10005;</button>
        </div>`;
      list.appendChild(d);
    });
  });
};

G.showDmForm=async()=>{
  const form=$('dm-form');
  if(form.classList.contains('on')){form.classList.remove('on');return;}
  form.classList.add('on');
  $('dm-search').value='';
  const el=$('dm-suggest');
  el.innerHTML='<div style="opacity:.5;font-size:13px;text-align:center;padding:10px">読み込み中...</div>';
  grpMembers={};
  try{
    const gs=await get(ref(db,`v20_users/${myId}/myGroups`));
    if(!gs.exists()){el.innerHTML='<div style="opacity:.5;font-size:13px;text-align:center;padding:10px">グループに参加していません</div>';return;}
    for(const gid of Object.keys(gs.val())){
      try{
        const ms=await get(ref(db,`v20_groups/${gid}/members`));
        if(!ms.exists())continue;
        for(const uid of Object.keys(ms.val())){
          if(uid===myId||grpMembers[uid])continue;
          try{const u=await get(ref(db,`v20_users/${uid}`));if(u.exists())grpMembers[uid]={name:u.val().name||uid};}catch{}
        }
      }catch{}
    }
  }catch(e){el.innerHTML=`<div style="color:var(--danger);font-size:13px;padding:10px">エラー: ${esc(e.message)}</div>`;return;}
  G.filterMembers('');
};

G.filterMembers=q=>{
  const el=$('dm-suggest'),lower=q.toLowerCase();
  const hits=Object.entries(grpMembers).filter(([uid,i])=>!q||(i.name||uid).toLowerCase().includes(lower)||uid.toLowerCase().includes(lower));
  if(!hits.length){el.innerHTML=`<div style="opacity:.5;font-size:13px;text-align:center;padding:10px">${q?'一致するメンバーが見つかりません':'同じグループのメンバーはいません'}</div>`;return;}
  el.innerHTML=hits.map(([uid,i])=>`<div class="mem-item" onclick="G.sendFriendReqTo('${uid}','${esc(i.name||uid)}')"><div class="ci-icon dm" style="width:36px;height:36px;font-size:14px;flex-shrink:0">${esc((i.name||uid)[0])}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px">${esc(i.name||uid)}</div><div style="font-size:12px;opacity:.5">@${esc(uid)}</div></div><span style="font-size:12px;color:var(--dm);font-weight:600">申請 &rsaquo;</span></div>`).join('');
};

G.sendFriendReqTo=async(uid,name)=>{
  if(!confirm(`${name}さんにフレンド申請を送りますか？`))return;
  try{
    const did=mkDmId(myId,uid);
    if((await get(ref(db,`v20_dms/${did}`))).exists())return alert('すでにDMが存在します');
    await update(ref(db,`v20_users/${uid}/friendRequests/${myId}`),{name:myName});
    alert('申請を送りました！');$('dm-form').classList.remove('on');
  }catch(e){alert('エラー: '+e.message);}
};
G.sendFriendReqById=async()=>{
  const tid=$('dm-search').value.trim();
  if(!tid)return alert('ユーザーIDを入力してください');
  if(tid===myId)return alert('自分自身には申請できません');
  try{
    const s=await get(ref(db,`v20_users/${tid}`));
    if(!s.exists())return alert('ユーザーが見つかりません');
    await G.sendFriendReqTo(tid,s.val().name||tid);
  }catch(e){alert('エラー: '+e.message);}
};
G.sendFriendReqByName=async()=>{
  const q=$('dm-search').value.trim();
  if(!q)return alert('名前を入力してください');
  const lower=q.toLowerCase();
  const matches=Object.entries(grpMembers).filter(([uid,i])=>(i.name||uid).toLowerCase().includes(lower));
  if(!matches.length)return alert(`「${q}」という名前のメンバーが同じグループにいません`);
  if(matches.length>1){alert(`「${q}」に一致するユーザーが${matches.length}人います。`);G.filterMembers(q);return;}
  await G.sendFriendReqTo(matches[0][0],matches[0][1].name||matches[0][0]);
};
G.acceptFreq=async(fuid,fname)=>{
  try{
    const did=mkDmId(myId,fuid);
    await set(ref(db,`v20_dms/${did}`),{users:{[myId]:true,[fuid]:true},names:{[myId]:myName,[fuid]:fname}});
    await update(ref(db,`v20_users/${myId}/myDMs`),{[did]:fuid});
    await update(ref(db,`v20_users/${fuid}/myDMs`),{[did]:myId});
    await remove(ref(db,`v20_users/${myId}/friendRequests/${fuid}`));
    alert(`${fname}さんとのDMを開始しました！`);G.home();
  }catch(e){alert('エラー: '+e.message);}
};
G.rejectFreq=async fuid=>{
  if(!confirm('この申請を拒否しますか？'))return;
  await remove(ref(db,`v20_users/${myId}/friendRequests/${fuid}`)).catch(()=>{});
};

G.enter=async(chatId,type,otherUid)=>{
  if(curLsn){curLsn();curLsn=null;}
  if(rtLsn){rtLsn();rtLsn=null;}
  curId=chatId;curType=type;curOther=otherUid||null;
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
  $('footer').style.display='flex';
  $('hset').style.visibility='visible';
  lastSeen[chatId]=Date.now();
  localStorage.setItem('ls',JSON.stringify(lastSeen));
  $('rt-bar').innerHTML='';
  if(type==='group'){
    try{
      const gs=await get(ref(db,`v20_groups/${chatId}`));
      if(gs.exists()){
        $('htitle').textContent=gs.val().name||chatId.split('_')[0];
        await update(ref(db,`v20_groups/${chatId}/members`),{[myId]:true}).catch(()=>{});
      }
    }catch{}
    rtLsn=onValue(ref(db,`v20_groups/${chatId}/realtime`),snap=>{
      if(!snap.exists())return;
      const bar=$('rt-bar');
      snap.forEach(c=>{
        const uid=c.key,info=c.val();
        let tr=document.getElementById(`rt-${uid}`);
        if(!tr){tr=document.createElement('div');tr.id=`rt-${uid}`;tr.className='rt-track';
          tr.innerHTML=`<div class="rt-bub" id="rtb-${uid}"></div><div class="rt-lbl">${esc(info.name)}</div>`;
          bar.appendChild(tr);bar.classList.add('on');$('chat-area').classList.add('bar');}
        const b=document.getElementById(`rtb-${uid}`);
        if(b&&b.textContent!==info.text){b.textContent=info.text;b.style.animation='none';void b.offsetHeight;b.style.animation='';}
      });
    });
    curLsn=onValue(ref(db,`v20_groups/${chatId}/messages`),s=>renderMsgs(s,chatId,'group'));
  }else{
    let oname=otherUid;
    try{const u=await get(ref(db,`v20_users/${otherUid}`));if(u.exists())oname=u.val().name;}catch{}
    $('htitle').textContent=oname;
    curLsn=onValue(ref(db,`v20_dms/${chatId}/messages`),s=>renderMsgs(s,chatId,'dm'));
  }
};

const renderMsgs=(snap,chatId,type)=>{
  const area=$('chat-area');area.innerHTML='';
  if(!snap.exists())return;
  const base=type==='group'?`v20_groups/${chatId}/messages`:`v20_dms/${chatId}/messages`;
  snap.forEach(c=>{
    const key=c.key,m=c.val(),isMe=m.uid===myId;
    if(!isMe&&(!m.readBy||!m.readBy[myId]))
      update(ref(db,`${base}/${key}/readBy`),{[myId]:{name:myName,time:Date.now()}}).catch(()=>{});
    const rc=m.readBy?Object.keys(m.readBy).length:0;
    const ts=fmt(m.time);
    let html='';
    if(m.type==='file'){
      const img=/\.(jpg|jpeg|png|gif|webp)$/i.test(m.fileName||'');
      html=img?`<img src="${m.data}" class="img-pre" onclick="G._view('${key}')">`:`<div class="bubble" onclick="G._dl('${key}')">&#128196; ${esc(m.fileName)}</div>`;
    }else{
      html=`<div class="bubble" onclick="G.readStatus('${key}')">${esc(m.text||'')}</div>`;
    }
    const rh=rc>0?`<span class="rbadge" onclick="G.readStatus('${key}')">&#10003; ${rc}</span>`:`<span style="opacity:.3">未読</span>`;
    const row=document.createElement('div');
    row.className=`msg-row${isMe?' me':''}`;
    row.dataset.key=key;
    row.innerHTML=`
      <div class="u-icon">${esc((m.name||'?')[0])}</div>
      <div style="max-width:100%">
        ${!isMe?`<div class="msg-name">${esc(m.name||'')}</div>`:''}
        ${html}
        <div class="msg-meta">${ts} ${rh}</div>
      </div>`;
    if(m.type==='file')row._fd={data:m.data,fileName:m.fileName};
    area.appendChild(row);
  });
  area.scrollTop=area.scrollHeight;
};

G._view=key=>{const r=document.querySelector(`[data-key="${key}"]`);if(r&&r._fd)G.openViewer(r._fd.data,r._fd.fileName);};
G._dl=key=>{const r=document.querySelector(`[data-key="${key}"]`);if(r&&r._fd)G.dl(r._fd.data,r._fd.fileName);};

G.send=async()=>{
  const inp=$('msg-input');if(!inp||!curId)return;
  const text=inp.value.trim();if(!text)return;
  const sig=`${curId}::${text}`,now=Date.now();
  if(sending||(sig===lastSig&&now-lastSigAt<1200))return;
  sending=true;lastSig=sig;lastSigAt=now;
  const btn=$('send-btn');btn.disabled=true;
  inp.value='';inp.style.height='auto';
  try{
    if(curType==='group'){
      const mid=push(ref(db,`v20_groups/${curId}/messages`)).key;
      await update(ref(db),{
        [`v20_groups/${curId}/messages/${mid}`]:{uid:myId,name:myName,text,type:'text',time:serverTimestamp()},
        [`v20_groups/${curId}/realtime/${myId}`]:{name:myName,text,lastMsgId:mid,time:serverTimestamp()}
      });
    }else{
      await push(ref(db,`v20_dms/${curId}/messages`),{uid:myId,name:myName,text,type:'text',time:serverTimestamp()});
    }
  }catch(e){alert('送信失敗: '+e.message);inp.value=text;}
  finally{sending=false;btn.disabled=false;inp.focus();}
};

G.sendFile=inp=>{
  const f=inp.files[0];if(!f||!curId)return;
  const r=new FileReader();
  r.onload=e=>{
    const path=curType==='group'?`v20_groups/${curId}/messages`:`v20_dms/${curId}/messages`;
    push(ref(db,path),{uid:myId,name:myName,type:'file',data:e.target.result,fileName:f.name,time:serverTimestamp()}).catch(err=>alert('ファイル送信失敗: '+err.message));
  };
  r.readAsDataURL(f);inp.value='';
};

G.readStatus=async msgId=>{
  if(!curId)return;
  const path=curType==='group'?`v20_groups/${curId}/messages/${msgId}/readBy`:`v20_dms/${curId}/messages/${msgId}/readBy`;
  const s=await get(ref(db,path)).catch(()=>null);
  const el=$('read-list');el.innerHTML='';
  if(s&&s.exists()){
    Object.values(s.val()).forEach(r=>{
      const d=document.createElement('div');d.className='ritem';
      d.innerHTML=`<div class="u-icon">${esc((r.name||'?')[0])}</div><div><b>${esc(r.name||'')}</b><br><small style="opacity:.5">${fmt(r.time)}</small></div>`;
      el.appendChild(d);
    });
  }else{el.innerHTML='<div style="padding:20px;text-align:center;opacity:.5">まだ誰も読んでいません</div>';}
  $('read-modal').classList.add('active');
};

G.showForm=mode=>{
  window._gmode=mode;

G.execGroup=async()=>{
  const id=$('g-id').value.trim(),pw=$('g-pw').value;
  if(!id)return alert('入力してください');
  try{
    if(window._gmode==='create'){
      const gid=id+'_'+Math.random().toString(36).substr(2,6);
      await set(ref(db,`v20_groups/${gid}`),{name:id,pw,host:myId,members:{[myId]:true}});
      await update(ref(db,`v20_users/${myId}/myGroups`),{[gid]:true});
      alert('グループを作成しました！');
    }else{
      const s=await get(ref(db,'v20_groups'));let tgt=null;
      s.forEach(g=>{if(g.val().name===id&&g.val().pw===pw)tgt=g.key;});
      if(tgt){await update(ref(db,`v20_groups/${tgt}/requests/${myId}`),{uid:myId,name:myName});alert('申請を送りました。管理者が許可するまでお待ちください。');}
      else alert('グループが見つかりません');
    }
  }catch(e){alert('エラー: '+e.message);}
  G.home();
};
G.leaveGroup=async()=>{

  try{
    await remove(ref(db,`v20_users/${myId}/myGroups/${curId}`));
    await remove(ref(db,`v20_groups/${curId}/requests/${myId}`));
    await remove(ref(db,`v20_groups/${curId}/members/${myId}`));
    await remove(ref(db,`v20_users/${myId}/pinnedChats/${curId}`));

  }catch(e){alert('エラー: '+e.message);}
};

    await remove(ref(db,`v20_users/${myId}/myDMs/${curId}`));
    await remove(ref(db,`v20_users/${myId}/pinnedChats/${curId}`));

};

G.openSettings=async()=>{

G.saveTeam=async()=>{

  clear();goAuth();
};
G.deleteAccount=async()=>{
  if(!confirm('本当にアカウントを削除しますか？\nこの操作は元に戻せません。'))return;
  try{
    const gs=await get(ref(db,`v20_users/${myId}/myGroups`));
    if(gs.exists())for(const gid of Object.keys(gs.val())){
      await remove(ref(db,`v20_groups/${gid}/requests/${myId}`)).catch(()=>{});
      await remove(ref(db,`v20_groups/${gid}/members/${myId}`)).catch(()=>{});
    }
    await remove(ref(db,`v20_presence/${myId}`));
    await remove(ref(db,`v20_users/${myId}`));
    clear();goAuth();
  }catch(e){alert('エラー: '+e.message);}
};

G.openViewer=(url,name)=>{$('viewer-img').src=url;window._vf={url,name};$('viewer').style.display='flex';};
G.dlFromViewer=()=>{const a=document.createElement('a');a.href=window._vf.url;a.download=window._vf.name;a.click();};
G.dl=(data,name)=>{const a=document.createElement('a');a.href=data;a.download=name;a.click();};

$('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();G.send();}});
$('msg-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});

window.addEventListener('load',async()=>{
  G.toggleDark(localStorage.getItem('dark')==='true');
  const showAuth=await check();
  if(showAuth)goAuth();
  else{presence();G.home();}
});
</script>
</body>
